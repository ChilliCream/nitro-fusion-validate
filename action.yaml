name: "Nitro Fusion Validate"
description: "Validates GraphQL source schemas against the Nitro registry"
author: "ChilliCream"
branding:
  icon: "check-circle"
  color: "purple"

inputs:
  stage:
    description: "The name of the stage"
    required: true
  api-id:
    description: "The ID of the API"
    required: true
  api-key:
    description: "API key for authentication"
    required: true
    secret: true
  source-schema-files:
    description: "Paths to source schema files (.graphqls) or directories containing source schema files"
    required: true
  legacy-v1-archive:
    description: "The path to a Fusion v1 archive file."
    required: false
  cloud-url:
    description: "The URL of the Nitro registry"
    required: false
  comment-mode:
    description: "Controls pull request feedback on validation failure: comment, review, or none"
    required: false
    default: "none"

runs:
  using: "node24"
  main: "dist/index.js"
